version: '1.0'
entities:
  - name: Model
    type: gen_ai.request.model
    externalId: openlit.chat
    matchingAttributeName: gen_ai.operation.name
    matchingPatternType: value
    matchingValue: chat
    entityType: model
    messageMatching:
      type: canonical
      canonicalMessageMatchingConfiguration:
        inputAttributeKey: gen_ai.input_messages
        outputAttributeKey: gen_ai.output_messages
      flatMessageMatchingConfiguration: null
    entityHighlights:
      - key: gen_ai.request.model
        title: Request Model
        valueType: string
      - key: gen_ai.response.model
        title: Response Model
        valueType: string
      - key: gen_ai.usage.input_tokens
        title: Input Tokens
        valueType: number
      - key: gen_ai.usage.output_tokens
