version: '1.0'
entities:
  - name: 'Chat Model'
    description: 'GenAI chat model inference (LLM calls)'
    type: 'gen_ai.response.model'
    externalId: 'openllmetry.model'
    matchingAttributeName: 'llm.request.type'
    matchingPatternType: 'value'
    matchingValue: 'chat'
    entityType: 'model'
    messageMatching:
      type: flat
      flatMessageMatchingConfiguration:
        flatInputMessageMatchingKeys:
          namePattern: ''
          rolePattern: ^gen_ai\.prompt\.\d+\.role$
          contentPattern: ^gen_ai\.prompt\.\d+\.content$
          toolCallIdPattern: ''
          toolMessageCallIdPattern: ''
          toolCallFunctionNamePattern: ''
          toolCallFunctionArgumentPattern: ''
        flatOutputMessageMatchingKeys:
          namePattern: ''
          rolePattern: ^gen_ai\.completion\.\d+\.role$
          contentPattern: ^gen_ai\.completion\.\d+\.content$
          toolCallIdPattern: ^gen_ai\.completion\.\d+\.tool_calls\.\d+\.id$
          toolMessageCallIdPattern: ''
          toolCallFunctionNamePattern: ^gen_ai\.completion\.\d+\.tool_calls\.\d+\.name$
          toolCallFunctionArgumentPattern: ^gen_ai\.completion\.\d+\.tool_calls\.\d+\.arguments$
      canonicalMessageMatchingConfiguration: null
    entityHighlights:
      - title: 'Model'
        key: 'gen_ai.response.model'
        valueType: 'string'
      - title: 'System'
        key: 'gen_ai.system'
        valueType: 'string'
      - title: 'Max Tokens'
        key: 'gen_ai.request.max_tokens'
        valueType: 'number'
      - title: 'Input Tokens'
        key: 'gen_ai.usage.input_tokens'
        valueType: 'number'
      - title: 'Output Tokens'
        key: 'gen_ai.usage.output_tokens'
        valueType: 'number'
      - title: 'Tool Name'
        key: 'llm.request.functions.0.name'
        valueType: 'string'
      - title: 'Tool Description'
        key: 'llm.request.functions.0.description'
        valueType: 'string'
      - title: 'Tool Parameters'
        key: 'llm.request.functions.0.parameters'
        valueType: 'string'
  - name: 'Generation Model'
    description: 'GenAI generation model inference (LLM calls)'
    type: 'gen_ai.response.model'
    externalId: 'openllmetry.generation.model'
    matchingAttributeName: 'llm.request.type'
    matchingPatternType: 'value'
    matchingValue: 'generation'
    entityType: 'model'
    messageMatching:
      type: flat
      flatMessageMatchingConfiguration:
        flatInputMessageMatchingKeys:
          namePattern: ''
          rolePattern: ^gen_ai\.prompt\.\d+\.role$
          contentPattern: ^gen_ai\.prompt\.\d+\.content$
          toolCallIdPattern: ''
          toolMessageCallIdPattern: ''
          toolCallFunctionNamePattern: ''
          toolCallFunctionArgumentPattern: ''
        flatOutputMessageMatchingKeys:
          namePattern: ''
          rolePattern: ^gen_ai\.completion\.\d+\.role$
          contentPattern: ^gen_ai\.completion\.\d+\.content$
          toolCallIdPattern: ^gen_ai\.completion\.\d+\.tool_calls\.\d+\.id$
          toolMessageCallIdPattern: ''
          toolCallFunctionNamePattern: ^gen_ai\.completion\.\d+\.tool_calls\.\d+\.name$
          toolCallFunctionArgumentPattern: ^gen_ai\.completion\.\d+\.tool_calls\.\d+\.arguments$
      canonicalMessageMatchingConfiguration: null
    entityHighlights:
      - title: 'Model'
        key: 'gen_ai.response.model'
        valueType: 'string'
      - title: 'System'
        key: 'gen_ai.system'
        valueType: 'string'
      - title: 'Max Tokens'
        key: 'gen_ai.request.max_tokens'
        valueType: 'number'
      - title: 'Input Tokens'
        key: 'gen_ai.usage.input_tokens'
        valueType: 'number'
      - title: 'Output Tokens'
        key: 'gen_ai.usage.output_tokens'
        valueType: 'number'
      - title: 'Tool Name'
        key: 'llm.request.functions.0.name'
        valueType: 'string'
      - title: 'Tool Description'
        key: 'llm.request.functions.0.description'
        valueType: 'string'
      - title: 'Tool Parameters'
        key: 'llm.request.functions.0.parameters'
        valueType: 'string'
  - name: 'Embedding'
    description: 'Embedding model spans'
    type: 'llm.request.type'
    externalId: 'openllmetry.embedding'
    matchingAttributeName: 'llm.request.type'
    matchingPatternType: 'value'
    matchingValue: 'embedding'
    entityType: 'embedding'
    entityHighlights: []
  - name: 'Tool'
    description: 'Traceloop tool span'
    type: 'traceloop.entity.name'
    externalId: 'openllmetry.tool'
    matchingAttributeName: 'traceloop.span.kind'
    matchingPatternType: 'value'
    matchingValue: 'tool'
    entityType: 'tool'
    entityHighlights:
      - title: 'Tool Name'
        key: 'traceloop.entity.name'
        valueType: 'string'
      - title: 'Input'
        key: 'traceloop.entity.input'
        valueType: 'string'
      - title: 'Output'
        key: 'traceloop.entity.output'
        valueType: 'string'
  - name: 'Agent'
    description: 'Traceloop agent span (agent boundary with workflow/agent context)'
    type: 'traceloop.entity.name'
    externalId: 'openllmetry.agent'
    matchingAttributeName: 'traceloop.span.kind'
    matchingPatternType: 'value'
    matchingValue: 'agent'
    entityType: 'agent'
    entityHighlights:
      - title: 'Agent Name'
        key: 'traceloop.entity.name'
        valueType: 'string'
      - title: 'Entity Version'
        key: 'traceloop.entity.version'
        valueType: 'string'
      - title: 'Workflow Name'
        key: 'traceloop.workflow.name'
        valueType: 'string'
      - title: 'GenAI Agent Name'
        key: 'gen_ai.agent.name'
        valueType: 'string'
      - title: 'Input'
        key: 'traceloop.entity.input'
        valueType: 'string'
      - title: 'Output'
        key: 'traceloop.entity.output'
        valueType: 'string'
  - name: 'Workflow'
    description: 'Traceloop workflow span (top-level container, establishes workflow name for descendants)'
    type: 'workflow'
    iconId: 'git-branch'
    externalId: 'openllmetry.workflow'
    matchingAttributeName: 'traceloop.span.kind'
    matchingPatternType: 'value'
    matchingValue: 'workflow'
    entityType: 'custom'
    entityHighlights:
      - title: 'Workflow Name'
        key: 'traceloop.entity.name'
        valueType: 'string'
      - title: 'Entity Version'
        key: 'traceloop.entity.version'
        valueType: 'string'
      - title: 'Workflow Name (Context)'
        key: 'traceloop.workflow.name'
        valueType: 'string'
      - title: 'Input'
        key: 'traceloop.entity.input'
        valueType: 'string'
      - title: 'Output'
        key: 'traceloop.entity.output'
        valueType: 'string'
  - name: 'Vector DB'
    description: 'Vector database spans (Chroma, Pinecone, Qdrant, Milvus, Weaviate, Marqo, LanceDB)'
    type: 'vector-db'
    iconId: 'database'
    externalId: 'openllmetry.vector-db'
    matchingAttributeName: 'db.system'
    matchingPatternType: 'regex'
    matchingPattern: '^(chroma|Pinecone|Qdrant|milvus|weaviate|marqo|lancedb)$'
    entityType: 'custom'
    entityHighlights:
      - title: 'DB System'
        key: 'db.system'
        valueType: 'string'
      - title: 'Operation'
        key: 'db.operation'
        valueType: 'string'
  - name: 'Task'
    description: 'Traceloop task span'
    type: 'task'
    iconId: 'list-checks'
    externalId: 'openllmetry.task'
    matchingAttributeName: 'traceloop.span.kind'
    matchingPatternType: 'value'
    matchingValue: 'task'
    entityType: 'custom'
    entityHighlights:
      - title: 'Entity Path'
        key: 'traceloop.entity.path'
        valueType: 'string'
      - title: 'Entity Name'
        key: 'traceloop.entity.name'
        valueType: 'string'
