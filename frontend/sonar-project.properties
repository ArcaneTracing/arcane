# Project
sonar.projectKey=arcane-monitor
sonar.projectName=arcane Frontend
sonar.projectVersion=0.1.0
sonar.sourceEncoding=UTF-8

# Paths (align with backend: sources and tests both under src)
sonar.sources=src
sonar.tests=src

# Test file patterns (align with jest testMatch)
sonar.test.inclusions=**/__tests__/**/*.test.ts,**/__tests__/**/*.test.tsx,**/__tests__/**/*.spec.ts,**/__tests__/**/*.spec.tsx,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusions (align with jest testPathIgnorePatterns; exclude tests from issue analysis)
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/e2e/**,**/public/**,**/docs/**,**/*.d.ts,**/__mocks__/**,**/test-utils*.tsx,**/msw-handlers.ts,**/routeTree.gen.ts,**/ui/**,**/icons/**,**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage exclusions (align with jest collectCoverageFrom)
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/__tests__/**,**/e2e/**,**/*.d.ts,**/test-utils*.tsx,**/msw-handlers.ts,**/ui/**,**/icons/**,**/statistics-tooltips.ts,**/better-auth.ts,**/react-query-config.ts,**/profile.ts,**/message-matching/**,**/toast.ts,**/AppLayout.tsx,**/HomeRedirect.tsx,**/NotFoundFallback.tsx,**/ProjectLayout.tsx,**/QueryClientProvider.tsx,**/SetupGuard.tsx,**/ThemeProvider.tsx,**/annotation-queues/index.ts,**/datasets/index.ts,**/datasources/index.ts,**/evaluations/index.ts,**/projects/index.ts,**/prompts/index.ts,**/scores/index.ts,**/evaluations/ragas-scores.ts,**/sidebar.tsx,**/evaluations-table.tsx,**/roles-tab.tsx,**/users-tab.tsx,**/conversation-table.tsx,**/icon-picker.tsx,**/flat-message-matching-step.tsx,**/entity-dialog-content.tsx,**/score-form.tsx

# Jest coverage (same as backend). Run "npm run test:coverage" before sonar-scanner, or use "npm run sonar"
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# JavaScript/TypeScript: more memory for large projects (see docs.sonarsource.com JS/TS troubleshooting)
sonar.javascript.node.maxspace=8192

# Language (backend uses sonar.language=ts)
sonar.language=ts

# Server auth (set via env: SONAR_TOKEN, sonar.host.url)
# sonar.host.url=http://localhost:9000
# sonar.token=...

# Additional settings
sonar.scanner.force-deprecated-java-version-warning=false
